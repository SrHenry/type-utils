name: Publish to NPM (via Release)

on:
    release:
        types: [published]

permissions:
    id-token: write # Required for npm OIDC publishing
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.release.tag_name }}

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'

            # Yarn 1.x comes preinstalled with Node, but we enforce the exact version
            - name: Ensure Yarn 1.x
              run: |
                  corepack enable
                  corepack prepare yarn@1 --activate
                  YARN_VERSION=$(yarn --version)
                  echo "Yarn version: $YARN_VERSION"
                  if ! echo "$YARN_VERSION" | grep -qE '^1\.'; then
                    echo "::error::Expected Yarn 1.x but got $YARN_VERSION. Aborting."
                    exit 1
                  fi

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Build project
              run: yarn build:clean

            - name: Run tests
              run: yarn test

            - name: Check circular dependencies
              run: yarn circular-dependencies

            - name: Publish to npm
              run: npm publish --provenance
